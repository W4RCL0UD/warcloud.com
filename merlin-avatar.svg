<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="50%" style="stop-color:#9b5de5"/>
      <stop offset="100%" style="stop-color:#f15bb5"/>
    </linearGradient>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Mystical circle -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.4"/>
  
  <!-- Wizard hat -->
  <path d="M120 280 L200 80 L280 280 Z" fill="url(#glow)" filter="url(#glowFilter)" opacity="0.9"/>
  <ellipse cx="200" cy="280" rx="90" ry="25" fill="url(#glow)" opacity="0.7"/>
  
  <!-- Hat band -->
  <path d="M135 240 Q200 260 265 240" stroke="#00f5d4" stroke-width="4" fill="none" filter="url(#glowFilter)"/>
  <circle cx="200" cy="250" r="12" fill="#00f5d4" filter="url(#glowFilter)"/>
  
  <!-- Face shadow -->
  <ellipse cx="200" cy="230" rx="60" ry="50" fill="#1a1a2e"/>
  
  <!-- Eyes -->
  <ellipse cx="175" cy="220" rx="15" ry="20" fill="#00f5d4" filter="url(#glowFilter)"/>
  <ellipse cx="225" cy="220" rx="15" ry="20" fill="#00f5d4" filter="url(#glowFilter)"/>
  <ellipse cx="175" cy="218" rx="8" ry="12" fill="#0a0a0f"/>
  <ellipse cx="225" cy="218" rx="8" ry="12" fill="#0a0a0f"/>
  
  <!-- Beard -->
  <path d="M150 250 Q170 320 200 350 Q230 320 250 250" fill="#f5f5f5" opacity="0.9"/>
  <path d="M150 250 Q170 320 200 350 Q230 320 250 250" fill="url(#glow)" opacity="0.3"/>
  
  <!-- Stars -->
  <circle cx="80" cy="100" r="2" fill="#00f5d4" opacity="0.8"/>
  <circle cx="320" cy="80" r="2" fill="#9b5de5" opacity="0.8"/>
  <circle cx="60" cy="200" r="1.5" fill="#f15bb5" opacity="0.6"/>
  <circle cx="340" cy="180" r="1.5" fill="#00f5d4" opacity="0.6"/>
  <circle cx="100" cy="320" r="2" fill="#9b5de5" opacity="0.7"/>
  <circle cx="300" cy="340" r="1.5" fill="#f15bb5" opacity="0.7"/>
</svg>
