<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="wc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="warpulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="50%" style="stop-color:#9b5de5"/>
      <stop offset="100%" style="stop-color:#00f5d4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#wc1)"/>
  
  <!-- Cloud shape - fluffy cumulus -->
  <ellipse cx="200" cy="180" rx="120" ry="80" fill="#1a1a2e" stroke="url(#warpulse)" stroke-width="3"/>
  <ellipse cx="140" cy="160" rx="60" ry="50" fill="#1a1a2e" stroke="url(#warpulse)" stroke-width="2"/>
  <ellipse cx="260" cy="160" rx="60" ry="50" fill="#1a1a2e" stroke="url(#warpulse)" stroke-width="2"/>
  <ellipse cx="180" cy="130" rx="50" ry="40" fill="#1a1a2e" stroke="url(#warpulse)" stroke-width="2"/>
  <ellipse cx="230" cy="135" rx="45" ry="35" fill="#1a1a2e" stroke="url(#warpulse)" stroke-width="2"/>
  
  <!-- Lightning bolt through cloud -->
  <path d="M200 220 L180 280 L195 275 L185 340 L230 270 L210 275 L220 220 Z" fill="#00f5d4"/>
  
  <!-- Glow effect -->
  <path d="M200 220 L180 280 L195 275 L185 340 L230 270 L210 275 L220 220 Z" fill="#00f5d4" opacity="0.3"/>
</svg>
