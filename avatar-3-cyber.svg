<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="50%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#9b5de5"/>
    </linearGradient>
  </defs>
  
  <!-- Cyber background -->
  <rect width="400" height="400" fill="url(#bg3)"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#00f5d4" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#00f5d4" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="300" x2="400" y2="300" stroke="#00f5d4" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="0" x2="100" y2="400" stroke="#00f5d4" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#00f5d4" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="#00f5d4" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Cyber wizard helmet shape -->
  <path d="M130 280 L160 120 L200 60 L240 120 L270 280 Z" fill="none" stroke="url(#cyber)" stroke-width="3"/>
  <ellipse cx="200" cy="280" rx="80" ry="20" fill="none" stroke="url(#cyber)" stroke-width="2"/>
  
  <!-- Visor/face plate -->
  <rect x="145" y="180" width="110" height="60" rx="5" fill="#00f5d4" opacity="0.1" stroke="#00f5d4" stroke-width="2"/>
  
  <!-- Digital eyes -->
  <rect x="160" y="195" width="30" height="15" fill="#00f5d4"/>
  <rect x="210" y="195" width="30" height="15" fill="#9b5de5"/>
  
  <!-- Circuit patterns -->
  <line x1="200" y1="60" x2="200" y2="40" stroke="#00f5d4" stroke-width="2"/>
  <circle cx="200" cy="35" r="5" fill="#00f5d4"/>
  <line x1="130" y1="200" x2="110" y2="200" stroke="#00f5d4" stroke-width="1"/>
  <line x1="270" y1="200" x2="290" y2="200" stroke="#9b5de5" stroke-width="1"/>
  
  <!-- Data stream -->
  <rect x="195" y="280" width="10" height="80" fill="url(#cyber)" opacity="0.5"/>
</svg>
