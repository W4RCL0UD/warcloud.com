<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="wc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#wc2)"/>
  
  <!-- Abstract W shape as shield -->
  <path d="M80 100 L120 100 L200 220 L280 100 L320 100 L320 350 L280 350 L200 250 L120 350 L80 350 Z" 
        fill="none" stroke="#00f5d4" stroke-width="4"/>
  
  <!-- Inner W -->
  <path d="M100 130 L130 130 L200 220 L270 130 L300 130 L300 320 L270 320 L200 250 L130 320 L100 320 Z" 
        fill="none" stroke="#9b5de5" stroke-width="2" opacity="0.6"/>
  
  <!-- Cloud accent top -->
  <ellipse cx="200" cy="80" rx="80" ry="30" fill="#1a1a2e" stroke="#f15bb5" stroke-width="2"/>
  
  <!-- Lightning through center -->
  <path d="M200 150 L175 200 L190 195 L170 260 L230 190 L210 195 L220 150 Z" fill="#00f5d4"/>
  
  <!-- Glow dots -->
  <circle cx="100" cy="100" r="4" fill="#00f5d4"/>
  <circle cx="300" cy="100" r="4" fill="#9b5de5"/>
  <circle cx="100" cy="300" r="4" fill="#f15bb5"/>
  <circle cx="300" cy="300" r="4" fill="#00f5d4"/>
</svg>
